<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>材料OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #f3f6f4;
      --card: #ffffff;
      --main: #1f2933;
      --muted: #667085;
      --line: #d7ded9;
      --green: #7c8d4e;
      --green-dark: #5d6d36;
      --green-soft: #f3f6e8;
      --blue-soft: #e0ecff;
      --orange-soft: #fff3d6;
      --red-soft: #fff0f0;
      --yellow-soft: #fef3c7;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--main);
      font-size: 15px;
    }

    header {
      background: linear-gradient(90deg, var(--green-dark), var(--green));
      color: white;
      padding: 15px 14px;
      font-size: 21px;
      font-weight: bold;
      text-align: center;
    }

    .wrap {
      padding: 12px;
      max-width: 980px;
      margin: 0 auto;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .tab {
      border: 1px solid var(--line);
      background: white;
      color: var(--main);
      padding: 9px 12px;
      border-radius: 999px;
      font-weight: bold;
      cursor: pointer;
    }

    .tab.active {
      background: var(--green);
      color: white;
      border-color: var(--green);
    }

    .box {
      background: var(--card);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1px solid var(--line);
    }

    .box-title {
      display: block;
      color: var(--green-dark);
      margin-bottom: 8px;
      font-size: 16px;
      font-weight: 800;
    }

    input,
    select,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 11px;
      margin-top: 7px;
      margin-bottom: 7px;
      border: 1px solid var(--line);
      border-radius: 9px;
      font-size: 15px;
      background: white;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 640px) {
      .row {
        grid-template-columns: 1fr;
        gap: 0;
      }
    }

    .category-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin: 8px 0 10px;
    }

    .category-btn {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
    }

    .category-btn.active {
      background: var(--green);
      color: white;
      border-color: var(--green);
    }

    .status {
      color: var(--muted);
      padding: 8px 2px;
      font-size: 13px;
    }

    .message {
      padding: 11px;
      border-radius: 10px;
      margin-bottom: 10px;
      font-size: 14px;
      background: var(--green-soft);
      color: var(--green-dark);
      border: 1px solid #b7eadb;
      display: none;
    }

    .message.error {
      color: #b00020;
      background: var(--red-soft);
      border: 1px solid #fecaca;
    }

    .list-head,
    .list-row {
      display: grid;
      grid-template-columns: 1.75fr .65fr .55fr .45fr .75fr .55fr;
      gap: 8px;
      align-items: center;
    }

    .list-head {
      font-size: 12px;
      color: var(--muted);
      font-weight: bold;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
    }

    .list-row {
      background: white;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      margin-bottom: 7px;
    }

    .material-name {
      font-weight: 800;
      line-height: 1.35;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      white-space: nowrap;
    }

    .badge-location-warehouse {
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }

    .badge-location-excess {
      background: #ffedd5;
      color: #9a3412;
      border: 1px solid #fed7aa;
    }

    .badge-location-site {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .badge-location-order {
      background: #ede9fe;
      color: #5b21b6;
      border: 1px solid #ddd6fe;
    }

    .badge-location-used {
      background: #e5e7eb;
      color: #374151;
      border: 1px solid #d1d5db;
    }

    .badge-location-default {
      background: #eef2ff;
      color: #3730a3;
      border: 1px solid #c7d2fe;
    }

    .qty {
      text-align: right;
    }

    .qty-pill {
      display: inline-block;
      min-width: 42px;
      text-align: center;
      background: #ecfdf5;
      color: #065f46;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 900;
      font-size: 14px;
      border: 1px solid #bbf7d0;
    }

    .qty-pill.zero {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .qty-pill.low {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fde68a;
    }

    .unit {
      color: var(--muted);
      font-size: 13px;
    }

    .money {
      text-align: right;
      font-weight: 900;
      color: var(--green-dark);
      font-size: 13px;
      white-space: nowrap;
    }

    .money.zero {
      color: var(--muted);
      font-weight: 700;
    }

    .out-btn {
      border: 0;
      background: var(--green);
      color: white;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      width: 100%;
      min-width: 52px;
    }

    .out-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .partial-btn {
      border: 1px solid #fed7aa;
      background: #fff7ed;
      color: #9a3412;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 3px;
      display: inline-block;
    }

    .partial-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 8px;
    }

    .partial-card-title {
      font-weight: 900;
      color: var(--main);
      margin-bottom: 5px;
      font-size: 14px;
    }

    .partial-card-line {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .partial-card-qty {
      display: inline-block;
      background: #fff7ed;
      color: #9a3412;
      border: 1px solid #fed7aa;
      border-radius: 999px;
      padding: 4px 8px;
      font-weight: 900;
      margin-top: 4px;
      font-size: 13px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 22px;
      background: white;
      border-radius: 10px;
      border: 1px solid var(--line);
    }

    .hidden {
      display: none;
    }

    .main-btn {
      width: 100%;
      border: 0;
      border-radius: 12px;
      background: var(--green);
      color: white;
      padding: 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
    }

    .main-btn:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .cancel-btn {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: white;
      color: var(--main);
      padding: 13px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
    }

    .sub-note {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .out-summary {
      background: var(--green-soft);
      border: 1px solid #b7eadb;
      border-radius: 12px;
      padding: 11px;
      margin: 8px 0 10px;
    }

    .out-material-title {
      font-weight: 900;
      color: var(--green-dark);
      margin-bottom: 4px;
    }

    .out-amount {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .amount-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .amount-value {
      text-align: right;
      font-weight: 900;
      color: var(--green-dark);
      font-size: 18px;
    }

    @media (max-width: 760px) {
      .list-head {
        display: none;
      }

      .list-row {
        grid-template-columns: 1fr;
        gap: 7px;
      }

      .qty,
      .money {
        text-align: left;
      }

      .out-btn {
        width: auto;
      }
    }

    /* 音声入力バー（各フォーム上部） */
    .voice-bar {
      background: var(--green-soft);
      border: 1px solid #cfe0a8;
      border-radius: 12px;
      padding: 10px;
      margin: 4px 0 10px;
    }

    .voice-bar-btn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      background: var(--green);
      color: #fff;
      padding: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .voice-bar-btn.recording {
      background: #b00020;
    }

    .voice-heard {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
      min-height: 1em;
    }

    /* テキスト欄ごとのマイクボタン */
    .field-mic {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      min-width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      font-size: 18px;
      cursor: pointer;
      margin-top: 7px;
      margin-bottom: 7px;
    }

    .field-mic.recording {
      background: #ffe3e3;
      border-color: #f5a3a3;
    }

    .field-wrap {
      display: flex;
      gap: 7px;
      align-items: flex-start;
    }

    .field-wrap > input,
    .field-wrap > textarea {
      flex: 1;
    }
  </style>
</head>

<body>
  <header>
    材料OS<span id="headerCompany" style="font-size:13px; font-weight:normal;"></span>
    <a id="logoutLink" class="hidden" onclick="logoutApp()"
       style="float:right; color:#fff; font-size:12px; font-weight:normal; cursor:pointer; text-decoration:underline;">
      ログアウト
    </a>
  </header>

  <div class="wrap">
    <!-- ログイン -->
    <section id="screenLogin" class="hidden">
      <div class="box">
        <span class="box-title">ログイン</span>
        <div class="sub-note">会社コードとアクセスキーを入力してください。</div>

        <div id="loginApiUrlArea">
          <input id="loginApiUrl" placeholder="APIのURL（https://script.google.com/macros/s/…/exec）">
        </div>

        <input id="loginCompanyCode" placeholder="会社コード（例：MOUNT）" autocapitalize="characters">
        <input id="loginApiKey" type="password" placeholder="アクセスキー">

        <button id="loginBtn" class="main-btn" onclick="submitLogin()">ログイン</button>
      </div>
    </section>

    <div id="appTabs" class="tabs hidden">
      <button id="tabSearch" class="tab active" onclick="showScreen('search', this)">材料を探す</button>
      <button id="tabExcess" class="tab" onclick="showScreen('excess', this)">余り材料</button>
      <button id="tabOrder" class="tab" onclick="showScreen('order', this)">注文・入荷</button>
      <button id="tabMove" class="tab" onclick="showScreen('move', this)">現場間移動</button>
    </div>

    <div id="message" class="message"></div>

    <!-- 材料を探す -->
    <section id="screenSearch" class="hidden">
      <div class="box">
        <span class="box-title">材料を探す</span>

        <input
          id="keyword"
          type="text"
          placeholder="材料名・現場名・工番で検索"
          oninput="renderMaterialLocations()"
        >

        <div id="searchCategoryButtons" class="category-row"></div>

        <select id="locationFilter" onchange="renderMaterialLocations()">
          <option value="">所在区分：すべて</option>
          <option value="倉庫">倉庫</option>
          <option value="現場">現場</option>
          <option value="注文中">注文中</option>
        </select>
      </div>

      <div id="outBox" class="box hidden">
        <span class="box-title">出庫登録</span>

        <div class="out-summary">
          <div id="outMaterialTitle" class="out-material-title"></div>
          <div id="outMaterialInfo" class="small"></div>
        </div>

        <div class="voice-bar">
          <button id="outVoiceBtn" class="voice-bar-btn" onclick="voiceFillForm('out', this)">
            🎤 音声で数量を入れる
          </button>
          <div id="outVoiceHeard" class="voice-heard"></div>
        </div>

        <select id="outEmployeeSelect">
          <option value="">社員を選択</option>
        </select>

        <input
          id="outJobSelect"
          list="outJobData"
          inputmode="numeric"
          autocomplete="off"
          placeholder="工番を入力（数字で絞込）"
        >
        <datalist id="outJobData"></datalist>

        <div class="row">
          <select id="outQuantity" onchange="updateOutAmount()">
            <option value="">出庫数量</option>
          </select>

          <input id="outUnit" placeholder="単位" readonly>
        </div>

        <div class="out-amount">
          <div>
            <div class="amount-label">単価</div>
            <div id="outUnitPriceText" class="amount-value">0円</div>
          </div>
          <div>
            <div class="amount-label">出庫金額</div>
            <div id="outAmountText" class="amount-value">0円</div>
          </div>
        </div>

        <div class="field-wrap">
          <textarea id="outMemo" placeholder="備考"></textarea>
          <button class="field-mic" onclick="dictateToField('outMemo', this)" title="音声で入力">🎤</button>
        </div>

        <button id="outSubmitBtn" class="main-btn" onclick="submitMaterialOut()">出庫登録</button>
        <button class="cancel-btn" onclick="cancelMaterialOut()">キャンセル</button>
      </div>

      <div id="partialBox" class="box hidden">
        <span class="box-title">半端材料詳細</span>

        <div class="out-summary">
          <div id="partialMaterialTitle" class="out-material-title"></div>
          <div id="partialMaterialInfo" class="small"></div>
        </div>

        <div id="partialList"></div>

        <div id="partialOutBox" class="box hidden">
          <span class="box-title">半端出庫登録</span>

          <div class="out-summary">
            <div id="partialOutTitle" class="out-material-title"></div>
            <div id="partialOutInfo" class="small"></div>
          </div>

          <select id="partialOutEmployeeSelect">
            <option value="">社員を選択</option>
          </select>

          <input
            id="partialOutJobSelect"
            list="partialOutJobData"
            inputmode="numeric"
            autocomplete="off"
            placeholder="工番を入力（数字で絞込）"
          >
          <datalist id="partialOutJobData"></datalist>

          <textarea id="partialOutMemo" placeholder="備考"></textarea>

          <button
            id="partialOutSubmitBtn"
            class="main-btn"
            onclick="submitPartialOut()"
          >
            この半端を出庫登録
          </button>

          <button class="cancel-btn" onclick="cancelPartialOut()">キャンセル</button>
        </div>

        <button class="cancel-btn" onclick="closePartialBox()">閉じる</button>
      </div>

      <div id="status" class="status">読み込み中...</div>

      <div class="list-head">
        <div>材料</div>
        <div>所在</div>
        <div style="text-align:right;">数量</div>
        <div>単位</div>
        <div style="text-align:right;">金額</div>
        <div>操作</div>
      </div>

      <div id="list"></div>
    </section>

    <!-- 余り材料登録 -->
    <section id="screenExcess" class="hidden">
      <div class="box">
        <span class="box-title">余り材料登録</span>
        <div class="sub-note">社員・工番を選んで、余った材料を登録します。</div>

        <div class="voice-bar">
          <button id="exVoiceBtn" class="voice-bar-btn" onclick="voiceFillForm('excess', this)">
            🎤 音声で材料・数量を入れる
          </button>
          <div id="exVoiceHeard" class="voice-heard"></div>
        </div>

        <select id="exEmployeeSelect">
          <option value="">社員を選択</option>
        </select>

        <input
          id="exJobSelect"
          list="exJobData"
          inputmode="numeric"
          autocomplete="off"
          placeholder="工番を入力（数字で絞込）"
        >
        <datalist id="exJobData"></datalist>

        <div class="sub-note">カテゴリ</div>
        <div id="excessCategoryButtons" class="category-row"></div>

        <select id="exMaterialSelect" onchange="onExcessMaterialChange()">
          <option value="">材料マスターから選択</option>
        </select>

        <div class="field-wrap">
          <input id="exMaterialName" placeholder="材料名 手入力・修正可">
          <button class="field-mic" onclick="dictateToField('exMaterialName', this)" title="音声で入力">🎤</button>
        </div>

        <div class="row">
          <select id="exQuantity">
            <option value="">数量</option>
          </select>

          <div class="field-wrap">
            <input id="exUnit" placeholder="単位 例：個・缶・本">
            <button class="field-mic" onclick="dictateToField('exUnit', this)" title="音声で入力">🎤</button>
          </div>
        </div>

        <div class="row">
          <select id="exPartialQuantity">
            <option value="">半端数量なし</option>
            <option value="0.1">0.1</option>
            <option value="0.2">0.2</option>
            <option value="0.3">0.3</option>
            <option value="0.4">0.4</option>
            <option value="0.5">0.5</option>
            <option value="0.6">0.6</option>
            <option value="0.7">0.7</option>
            <option value="0.8">0.8</option>
            <option value="0.9">0.9</option>
          </select>

          <div class="field-wrap">
            <input id="exPartialUnit" placeholder="半端単位 例：缶・本・m">
            <button class="field-mic" onclick="dictateToField('exPartialUnit', this)" title="音声で入力">🎤</button>
          </div>
        </div>

        <div class="row">
          <select id="exStatus">
            <option value="未開封">未開封</option>
            <option value="開封済">開封済</option>
            <option value="半端あり">半端あり</option>
          </select>

          <div class="field-wrap">
            <input id="exStorageStatus" placeholder="保管状態 例：倉庫棚A・現場保管">
            <button class="field-mic" onclick="dictateToField('exStorageStatus', this)" title="音声で入力">🎤</button>
          </div>
        </div>

        <div class="field-wrap">
          <textarea id="exMemo" placeholder="メモ"></textarea>
          <button class="field-mic" onclick="dictateToField('exMemo', this)" title="音声で入力">🎤</button>
        </div>

        <button id="exSubmitBtn" class="main-btn" onclick="submitExcessMaterial()">余り材を登録</button>
      </div>
    </section>

    <!-- 注文・入荷 -->
    <section id="screenOrder" class="hidden">
      <div class="box">
        <span class="box-title">入荷登録</span>
        <div class="sub-note">倉庫に入った材料を登録します。</div>

        <div class="voice-bar">
          <button id="arrivalVoiceBtn" class="voice-bar-btn" onclick="voiceFillForm('arrival', this)">
            🎤 音声で材料・数量を入れる
          </button>
          <div id="arrivalVoiceHeard" class="voice-heard"></div>
        </div>

        <input id="arrivalDate" type="date">

        <select id="arrivalEmployeeSelect">
          <option value="">担当者を選択</option>
        </select>

        <div class="sub-note">カテゴリ</div>
        <div id="arrivalCategoryButtons" class="category-row"></div>

        <select id="arrivalMaterialSelect" onchange="onArrivalMaterialChange()">
          <option value="">材料を選択</option>
        </select>

        <input id="arrivalMaterialName" placeholder="材料名" readonly>

        <div class="row">
          <select id="arrivalQuantity" onchange="updateArrivalAmount()">
            <option value="">入荷数量</option>
          </select>

          <input id="arrivalUnit" placeholder="単位" readonly>
        </div>

        <div class="row">
          <input id="arrivalUnitPrice" type="number" placeholder="単価" oninput="updateArrivalAmount()">
          <input id="arrivalOrderId" placeholder="注文ID 任意">
        </div>

        <div class="out-amount">
          <div>
            <div class="amount-label">単価</div>
            <div id="arrivalUnitPriceText" class="amount-value">0円</div>
          </div>
          <div>
            <div class="amount-label">入荷金額</div>
            <div id="arrivalAmountText" class="amount-value">0円</div>
          </div>
        </div>

        <div class="field-wrap">
          <textarea id="arrivalMemo" placeholder="備考"></textarea>
          <button class="field-mic" onclick="dictateToField('arrivalMemo', this)" title="音声で入力">🎤</button>
        </div>

        <button id="arrivalSubmitBtn" class="main-btn" onclick="submitArrival()">入荷登録</button>
      </div>
    </section>

    <!-- 現場間移動 -->
    <section id="screenMove" class="hidden">
      <div class="box">
        <span class="box-title">現場間移動</span>

  <script>
    let appData = {
      employees: [],
      jobs: [],
      categories: [],
      materials: [],
      materialLocations: []
    };

    let selectedSearchCategory = '';
    let selectedExcessCategory = '';
    let selectedArrivalCategory = '';
    let selectedOutItem = null;
    let selectedPartialItem = null;

    // ==================================================
    // API接続（外部ホスティング版）
    // ==================================================

    // デプロイ後にAPIのURL（https://script.google.com/macros/s/…/exec）を
    // 入れておくと、ログイン画面のURL入力欄が非表示になります
    const DEFAULT_API_URL = 'https://script.google.com/macros/s/AKfycbzfhxnk-FdMMEs_42KNug1Vog92WBK2bAEZ7u4yYM0ldpsmU6i2_tgZxOKOqDX2vdLY/exec';

    let SESSION = null;

    function loadSession() {
      try {
        SESSION = JSON.parse(localStorage.getItem('zairyoOsSession') || 'null');
      } catch (e) {
        SESSION = null;
      }
    }

    function saveSession() {
      localStorage.setItem('zairyoOsSession', JSON.stringify(SESSION));
    }

    function clearSession() {
      localStorage.removeItem('zairyoOsSession');
      SESSION = null;
    }

    function callApi(method, payload, onSuccess, onFailure) {
      if (!SESSION || !SESSION.apiUrl) {
        onFailure({ message: 'ログインしてください' });
        return;
      }

      // GAS側の関数名とAPIアクションの対応（ForWeb系はJSON文字列を期待する既存処理に合わせる）
      const map = {
        getAppDataForWeb: { action: 'getAppData', stringify: true },
        getPartialMaterialsForWeb: {
          action: 'getPartialMaterials',
          stringify: true,
          wrap: function(p) { return { materialId: p }; }
        }
      };

      const m = map[method] || { action: method };

      const body = {
        apiKey: SESSION.apiKey,
        companyCode: SESSION.companyCode,
        action: m.action,
        payload: m.wrap ? m.wrap(payload) : (payload === undefined ? {} : payload)
      };

      fetch(SESSION.apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(body)
      })
        .then(function(response) { return response.json(); })
        .then(function(res) {
          if (res && res.ok) {
            onSuccess(m.stringify ? JSON.stringify(res.data) : res.data);
          } else {
            onFailure({ message: (res && res.error) || 'APIエラー' });
          }
        })
        .catch(function(err) {
          onFailure({ message: '通信エラー：' + (err.message || err) });
        });
    }

    // 既存コードの google.script.run 呼び出しをそのまま動かす互換レイヤー
    const google = { script: {} };

    Object.defineProperty(google.script, 'run', {
      get: function() {
        let onS = function() {};
        let onF = function(err) { showMessage(err.message || 'エラー', true); };

        const chain = {
          withSuccessHandler: function(fn) { onS = fn; return proxy; },
          withFailureHandler: function(fn) { onF = fn; return proxy; }
        };

        const proxy = new Proxy(chain, {
          get: function(target, prop) {
            if (prop in target) return target[prop];
            return function(payload) { callApi(String(prop), payload, onS, onF); };
          }
        });

        return proxy;
      }
    });

    // ==================================================
    // ログイン
    // ==================================================

    function submitLogin() {
      const apiUrl = DEFAULT_API_URL || getValue('loginApiUrl');
      const companyCode = getValue('loginCompanyCode').toUpperCase();
      const apiKey = document.getElementById('loginApiKey').value.trim();

      if (!apiUrl) {
        showMessage('APIのURLを入力してください', true);
        return;
      }

      if (!companyCode) {
        showMessage('会社コードを入力してください', true);
        return;
      }

      if (!apiKey) {
        showMessage('アクセスキーを入力してください', true);
        return;
      }

      SESSION = { apiUrl: apiUrl, companyCode: companyCode, apiKey: apiKey, companyName: '' };

      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerText = '確認中...';

      google.script.run
        .withSuccessHandler(function(res) {
          btn.disabled = false;
          btn.innerText = 'ログイン';

          SESSION.companyName = (res && res.companyName) || companyCode;
          saveSession();

          showApp();
          loadAppData();
        })
        .withFailureHandler(function(error) {
          btn.disabled = false;
          btn.innerText = 'ログイン';

          SESSION = null;
          showMessage('ログイン失敗：' + (error.message || error), true);
        })
        .ping({});
    }

    function showApp() {
      document.getElementById('screenLogin').classList.add('hidden');
      document.getElementById('appTabs').classList.remove('hidden');
      document.getElementById('logoutLink').classList.remove('hidden');

      document.getElementById('headerCompany').innerText =
        SESSION && SESSION.companyName ? '｜' + SESSION.companyName : '';

      showScreen('search', document.getElementById('tabSearch'));
    }

    function showLoginScreen() {
      document.getElementById('screenLogin').classList.remove('hidden');
      document.getElementById('appTabs').classList.add('hidden');
      document.getElementById('logoutLink').classList.add('hidden');

      ['screenSearch', 'screenExcess', 'screenOrder', 'screenMove']
        .forEach(function(id) {
          document.getElementById(id).classList.add('hidden');
        });

      if (DEFAULT_API_URL) {
        document.getElementById('loginApiUrlArea').classList.add('hidden');
      }
    }

    function logoutApp() {
      clearSession();
      location.reload();
    }

    function initApp() {
      loadSession();

      if (SESSION && SESSION.apiUrl && SESSION.apiKey && SESSION.companyCode) {
        showApp();
        loadAppData();
      } else {
        showLoginScreen();
      }
    }

    function showScreen(screen, btn) {
      document.getElementById('screenSearch').classList.add('hidden');
      document.getElementById('screenExcess').classList.add('hidden');
      document.getElementById('screenOrder').classList.add('hidden');
      document.getElementById('screenMove').classList.add('hidden');

      document.querySelectorAll('.tab').forEach(function(tab) {
        tab.classList.remove('active');
      });

      if (btn) {
        btn.classList.add('active');
      }

      if (screen === 'search') {
        document.getElementById('screenSearch').classList.remove('hidden');
        renderMaterialLocations();
        return;
      }

      if (screen === 'excess') {
        document.getElementById('screenExcess').classList.remove('hidden');
        return;
      }

      if (screen === 'order') {
        document.getElementById('screenOrder').classList.remove('hidden');
        return;
      }

      if (screen === 'move') {
        document.getElementById('screenMove').classList.remove('hidden');
        return;
      }
    }

    function loadAppData() {
      document.getElementById('status').innerText = '読み込み中...';

      google.script.run
        .withSuccessHandler(function(json) {
          try {
            appData = JSON.parse(json || '{}');
          } catch (e) {
            showMessage('JSON変換エラー：' + e.message, true);
            return;
          }

          appData.employees = appData.employees || [];
          appData.jobs = appData.jobs || [];
          appData.categories = appData.categories || [];
          appData.materials = appData.materials || [];
          appData.materialLocations = appData.materialLocations || [];

          setupInitialOptions();

          document.getElementById('status').innerText =
            '取得件数：' + appData.materialLocations.length + '件';

          renderMaterialLocations();
        })
        .withFailureHandler(function(error) {
          showMessage('読み込みエラー：' + (error.message || error), true);
        })
        .getAppDataForWeb();
    }

      renderEmployeeOptions();
      renderOutEmployeeOptions();
      renderArrivalEmployeeOptions();

      renderJobOptions();
      renderOutJobOptions();
      renderPartialOutJobOptions();

      renderQuantityOptions();
      renderArrivalQuantityOptions();

      renderSearchCategoryButtons();
      renderExcessCategoryButtons();
      renderArrivalCategoryButtons();

      renderExcessMaterialOptions();
      renderArrivalMaterialOptions();

      setTodayToArrivalDate();

      renderMoveEmployeeOptions();
      renderMoveFromJobOptions();
      renderMoveToJobOptions();
      renderMoveCategoryButtons();
      renderMoveMaterialOptions();
      renderMoveQuantityOptions();
    }

        '<option value="">社員を選択</option>' +
        appData.employees.map(function(emp) {

          return '<option value="' + escapeAttr(emp.employeeId) + '">' + escapeHtml(label) + '</option>';
        }).join('');

        }).join('');

    // 工番の候補リスト（datalist）を全工番で埋める。数字を打つとブラウザが自動で絞り込む

    function renderSearchCategoryButtons() {
      const el = document.getElementById('searchCategoryButtons');

    function renderExcessCategoryButtons() {

      let html =
        '<button class="category-btn ' +
        (selectedExcessCategory === '' ? 'active' : '') +
        '" onclick="setExcessCategory(\'\')">全部</button>';

      appData.categories.forEach(function(cat) {
        const active = selectedExcessCategory === cat.categoryName ? 'active' : '';

        html +=
          '<button class="category-btn ' +
          active +
          '" onclick="setExcessCategory(\'' +
          escapeJs(cat.categoryName) +
          '\')">' +
          escapeHtml(cat.categoryName) +
          '</button>';
      });

      el.innerHTML = html;
    }

    function setExcessCategory(categoryName) {

      document.getElementById('exMaterialSelect').value = '';
      renderExcessCategoryButtons();
      renderExcessMaterialOptions();
    }

    function renderArrivalCategoryButtons() {
      const el = document.getElementById('arrivalCategoryButtons');

      let html =
        '<button class="category-btn ' +
        (selectedArrivalCategory === '' ? 'active' : '') +
        '" onclick="setArrivalCategory(\'\')">全部</button>';

      appData.categories.forEach(function(cat) {

          escapeJs(cat.categoryName) +
          '\')">' +
          escapeHtml(cat.categoryName) +
          '</button>';
      });

    }

    function setArrivalCategory(categoryName) {
      selectedArrivalCategory = categoryName || '';
      document.getElementById('arrivalMaterialSelect').value = '';
      renderArrivalCategoryButtons();
      renderArrivalMaterialOptions();
    }

    function renderExcessMaterialOptions() {
      const select = document.getElementById('exMaterialSelect');

      const filtered = appData.materials.filter(function(mat) {
        return !selectedExcessCategory || mat.category === selectedExcessCategory;
      });

      select.innerHTML =
        '<option value="">材料マスターから選択</option>' +
        filtered.map(function(mat) {
          const label = mat.materialName + ' / ' + (mat.unit || '') + ' / ' + (mat.category || '');
          return '<option value="' + escapeAttr(mat.materialId) + '">' + escapeHtml(label) + '</option>';
        }).join('');
    }

    function renderArrivalMaterialOptions() {
      const select = document.getElementById('arrivalMaterialSelect');

      const filtered = appData.materials.filter(function(mat) {
        return !selectedArrivalCategory || mat.category === selectedArrivalCategory;
      });

      select.innerHTML =
        '<option value="">材料を選択</option>' +
        filtered.map(function(mat) {
          const label = mat.materialName + ' / ' + (mat.unit || '') + ' / ' + (mat.category || '');
          return '<option value="' + escapeAttr(mat.materialId) + '">' + escapeHtml(label) + '</option>';
        }).join('');
    }

    function onExcessMaterialChange() {
      const materialId = document.getElementById('exMaterialSelect').value;

      const material = appData.materials.find(function(mat) {
        return String(mat.materialId) === String(materialId);
      });

      if (!material) return;

      document.getElementById('exMaterialName').value = material.materialName || '';
      document.getElementById('exUnit').value = material.unit || '';

      selectedExcessCategory = material.category || selectedExcessCategory;
      renderExcessCategoryButtons();
    }

    function onArrivalMaterialChange() {
      const materialId = document.getElementById('arrivalMaterialSelect').value;

      const material = appData.materials.find(function(mat) {
        return String(mat.materialId) === String(materialId);
      });

      if (!material) return;

      document.getElementById('arrivalMaterialName').value = material.materialName || '';
      document.getElementById('arrivalUnit').value = material.unit || '';
      document.getElementById('arrivalUnitPrice').value = Number(material.unitPrice || 0);

      selectedArrivalCategory = material.category || selectedArrivalCategory;
      renderArrivalCategoryButtons();
      updateArrivalAmount();
    }

    function getLocationClass(locationType) {
      const value = String(locationType || '').trim();

      if (value.indexOf('倉庫') !== -1) {
        return 'badge-location-warehouse';
      }

      if (value.indexOf('余剰') !== -1 || value.indexOf('余り') !== -1) {
        return 'badge-location-excess';
      }

      if (value.indexOf('現場') !== -1) {
        return 'badge-location-site';
      }

      if (value.indexOf('注文') !== -1) {
        return 'badge-location-order';
      }

      if (value.indexOf('使用済') !== -1) {
        return 'badge-location-used';
      }

      return 'badge-location-default';
    }

    function getLocationLabel(locationType) {
      return String(locationType || '').trim();
    }

    function getQtyClass(qty) {
      const num = Number(qty || 0);

      if (num <= 0) {
        return 'qty-pill zero';
      }

      if (num <= 3) {
        return 'qty-pill low';
      }

      return 'qty-pill';
    }

    function renderMaterialLocations() {
      const keyword = document.getElementById('keyword').value.trim().toLowerCase();
      const locationFilter = document.getElementById('locationFilter').value;
      const list = document.getElementById('list');

      const filtered = appData.materialLocations.filter(function(item) {
        const location = String(item['所在区分'] || '').trim();
        const category = String(item['カテゴリ'] || '').trim();

        const text = [
          item['材料ID'],
          item['材料名'],
          item['カテゴリ'],
          item['所在区分'],
          item['工番'],
          item['現場名'],
          item['状態'],
          item['備考']
        ].map(function(v) {
          return String(v || '');
        }).join(' ').toLowerCase();

        const matchKeyword = !keyword || text.indexOf(keyword) !== -1;
        const matchLocation = !locationFilter || location === locationFilter;
        const matchCategory = !selectedSearchCategory || category === selectedSearchCategory;

        return matchKeyword && matchLocation && matchCategory;
      });

      document.getElementById('status').innerText =
        '表示件数：' + filtered.length + '件 / 全' + appData.materialLocations.length + '件';

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">該当する材料がありません</div>';
        return;
      }

      list.innerHTML = filtered.map(function(item) {
        const locationType = item['所在区分'] || '';
        const quantity = Number(item['数量'] || 0);
        const amount = Number(item['金額'] || 0);
        const amountText = amount ? amount.toLocaleString('ja-JP') + '円' : '-';
        const canOut = quantity > 0 && item['材料ID'] && locationType === '倉庫';

        const firstDate = item['初回入庫日'] || '';
        const lastDate = item['最終動作日'] || '';
        const lastType = item['最終動作区分'] || '';
        const lastQty = item['最終動作数量'] || '';
        const lastUnit = item['最終動作単位'] || '';
        const lastStaff = item['最終担当者'] || '';
        const hasPartial = item['半端あり'] === 'あり';

        let movementText = '';

        if (firstDate && lastDate) {
          movementText =
            '初回 ' + firstDate +
            '・最終 ' + lastDate +
            (lastType ? ' ' + lastType : '') +
            (lastQty ? String(lastQty) : '') +
            (lastUnit ? String(lastUnit) : '') +
            (lastStaff ? ' ' + lastStaff : '');
        } else if (lastDate) {
          movementText =
            '最終 ' + lastDate +
            (lastType ? ' ' + lastType : '') +
            (lastQty ? String(lastQty) : '') +
            (lastUnit ? String(lastUnit) : '') +
            (lastStaff ? ' ' + lastStaff : '');
        } else if (firstDate) {
          movementText = '初回 ' + firstDate;
        }

        let html = '';

        html += '<div class="list-row">';

        html += '<div>';
        html += '<div class="material-name">' + escapeHtml(item['材料名'] || '') + '</div>';
        html += '<div class="small">' +
          escapeHtml(item['カテゴリ'] || '') +
          ' / ' +
          escapeHtml(item['工番'] || '') +
          ' ' +
          escapeHtml(item['現場名'] || '') +
          '</div>';

        if (movementText) {
          html += '<div class="small">' + escapeHtml(movementText) + '</div>';
        }

        if (hasPartial) {
          html += '<div class="small">';
          html += '<button class="partial-btn" onclick="openPartialList(\'' +
            escapeAttr(item['材料ID'] || '') +
            '\')">半端あり</button>';
          html += '</div>';
        }

        html += '</div>';

        html += '<div>';
        html += '<span class="badge ' + getLocationClass(locationType) + '">';
        html += escapeHtml(getLocationLabel(locationType));
        html += '</span>';
        html += '</div>';

        html += '<div class="qty">';
        html += '<span class="' + getQtyClass(quantity) + '">';
        html += escapeHtml(quantity);
        html += '</span>';
        html += '</div>';

        html += '<div class="unit">';
        html += escapeHtml(item['単位'] || '');
        html += '</div>';

        html += '<div class="money ' + (amount ? '' : 'zero') + '">';
        html += escapeHtml(amountText);
        html += '</div>';

        html += '<div>';
        html += '<button class="out-btn" ' +
          (canOut ? '' : 'disabled') +
          ' onclick="openMaterialOut(\'' +
          escapeAttr(item['元ID'] || item['材料ID'] || '') +
          '\')">';
        html += '出庫';
        html += '</button>';
        html += '</div>';

        html += '</div>';

        return html;
      }).join('');
    }

    function openPartialList(materialId) {
      if (!materialId) {
        showMessage('材料IDがありません', true);
        return;
      }

      showMessage('半端材料を取得中...', false);

      google.script.run
        .withSuccessHandler(function(json) {
          let data = [];

          try {
            data = JSON.parse(json || '[]');
          } catch (e) {
            showMessage('半端材料データの読み込みに失敗しました', true);
            return;
          }

          renderPartialList(materialId, data);
        })
        .withFailureHandler(function(error) {
          showMessage(error.message || '半端材料の取得に失敗しました', true);
        })
        .getPartialMaterialsForWeb(materialId);
    }

    function renderPartialList(materialId, data) {
      const box = document.getElementById('partialBox');
      const title = document.getElementById('partialMaterialTitle');
      const info = document.getElementById('partialMaterialInfo');
      const list = document.getElementById('partialList');

    function formatYen(value) {
      const num = Number(value || 0);
      return num.toLocaleString('ja-JP') + '円';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#096;');
    }

    function escapeJs(value) {
      return String(value || '')
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/\n/g, '\\n')
        .replace(/\r/g, '');
    }

      };

      document.getElementById('moveSubmitBtn').disabled = true;
      document.getElementById('moveSubmitBtn').innerText = '移動登録中...';

      google.script.run
        .withSuccessHandler(function(res) {
          document.getElementById('moveSubmitBtn').disabled = false;
          document.getElementById('moveSubmitBtn').innerText = '現場間移動を登録';

          showMessage('現場間移動を登録しました：' + res.moveId, false);

          clearMoveForm();
          loadAppData();
          showScreen('search', document.getElementById('tabSearch'));
        })
        .withFailureHandler(function(error) {
          document.getElementById('moveSubmitBtn').disabled = false;
          document.getElementById('moveSubmitBtn').innerText = '現場間移動を登録';

          showMessage('移動登録エラー：' + (error.message || error), true);
        })
        .registerMaterialMove(payload);
    }

    // ==================================================
    // 音声入力（各フォーム共通）
    // ==================================================

    // いま音声認識中のインスタンス（同時に1つだけ）
    let activeVoiceRec = null;

    function getSpeechRec() {
      return window.SpeechRecognition || window.webkitSpeechRecognition;
    }

    // 単一フィールドへの音声入力（材料名・単位・備考など）
    function dictateToField(fieldId, btn) {
      const SR = getSpeechRec();

      if (!SR) {
        showMessage('この端末ではマイクが使えません。キーボードのマイクで入力してください', true);
        return;
      }

      // すでに録音中なら停止（トグル）
      if (activeVoiceRec) {
        activeVoiceRec.stop();
        return;
      }

      const el = document.getElementById(fieldId);
      const rec = new SR();

      rec.lang = 'ja-JP';
      rec.interimResults = false;
      rec.continuous = false;

      if (btn) btn.classList.add('recording');
      activeVoiceRec = rec;

      rec.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        el.value = (el.value ? el.value.trim() + ' ' : '') + transcript;

        if (typeof el.onchange === 'function') el.onchange();
      };

      rec.onerror = function(event) {
        handleVoiceError_(event.error);
      };

      rec.onend = function() {
        activeVoiceRec = null;
        if (btn) btn.classList.remove('recording');
      };

      rec.start();
    }

    // フォーム全体の音声入力（1文を話す→材料・数量・単位を自動で埋める）
    function voiceFillForm(kind, btn) {
      const SR = getSpeechRec();

      if (!SR) {
        showMessage('この端末ではマイクが使えません。キーボードのマイクで各欄に入力してください', true);
        return;
      }

      if (activeVoiceRec) {
        activeVoiceRec.stop();
        return;
      }

      const heardEl = document.getElementById(kind + 'VoiceHeard');
      const originalText = btn.innerText;
      const rec = new SR();

      rec.lang = 'ja-JP';
      rec.interimResults = false;
      rec.continuous = false;

      btn.classList.add('recording');
      btn.innerText = '🔴 聞き取り中...';
      activeVoiceRec = rec;

      rec.onresult = function(event) {
        const text = event.results[0][0].transcript;
        if (heardEl) heardEl.innerText = '認識：' + text + '（解析中...）';
        applyVoiceToForm(kind, text, heardEl);
      };

      rec.onerror = function(event) {
        handleVoiceError_(event.error);
      };

      rec.onend = function() {
        activeVoiceRec = null;
        btn.classList.remove('recording');
        btn.innerText = originalText;
      };

      rec.start();
    }

    function handleVoiceError_(error) {
      if (error === 'not-allowed' || error === 'service-not-allowed') {
        showMessage('マイクが許可されていません。端末のマイク設定を確認してください', true);
      } else if (error === 'no-speech') {
        showMessage('音声が聞き取れませんでした。もう一度お試しください', true);
      } else if (error && error !== 'aborted') {
        showMessage('音声エラー：' + error, true);
      }
    }

    // 話した1文をサーバーで解析し、対象フォームの欄を埋める
    function applyVoiceToForm(kind, text, heardEl) {
      google.script.run
        .withSuccessHandler(function(res) {
          const parsed = (res && res.parsed) || {};
          const match = (res && res.match) || {};

          fillFormFields_(kind, parsed, match);

          if (heardEl) {
            if (match.matched) {
              heardEl.innerText = '認識：' + text + ' → ' + match.materialName +
                (parsed.quantity ? ' ' + parsed.quantity + (parsed.unit || match.unit || '') : '');
            } else if (parsed.materialName) {
              heardEl.innerText = '認識：' + text +
                ' → 「' + parsed.materialName + '」は未登録。材料名欄に入れました（手入力・修正できます）';
            } else {
              heardEl.innerText = '認識：' + text + '（材料名が聞き取れませんでした）';
            }
          }
        })
        .withFailureHandler(function(error) {
          if (heardEl) heardEl.innerText = '解析エラー：' + (error.message || error);
        })
        .analyzeVoiceMaterialInput({ text: text });
    }

    function setSelectByValue_(selectId, value) {
      const select = document.getElementById(selectId);
      if (!select) return false;

      const val = String(value);
      for (let i = 0; i < select.options.length; i++) {
        if (String(select.options[i].value) === val) {
          select.value = val;
          return true;
        }
      }
      return false;
    }

    function fillFormFields_(kind, parsed, match) {
      const qty = parsed.quantity || '';
      const unit = parsed.unit || (match.matched ? match.unit : '');

      if (kind === 'out') {
        // 出庫は材料が確定済み。数量のみ反映
        if (qty) setSelectByValue_('outQuantity', qty);
        updateOutAmount();
        return;
      }

      if (kind === 'excess') {
        if (match.matched) {
          if (setSelectByValue_('exMaterialSelect', match.materialId)) {
            onExcessMaterialChange();
          }
          document.getElementById('exMaterialName').value = match.materialName || '';
        } else if (parsed.materialName) {
          document.getElementById('exMaterialName').value = parsed.materialName;
        }
        if (qty) setSelectByValue_('exQuantity', qty);
        if (unit) document.getElementById('exUnit').value = unit;
        return;
      }

      if (kind === 'arrival') {
        if (match.matched) {
          if (setSelectByValue_('arrivalMaterialSelect', match.materialId)) {
            onArrivalMaterialChange();
          }
        }
        if (qty) setSelectByValue_('arrivalQuantity', qty);
        if (unit && !match.matched) document.getElementById('arrivalUnit').value = unit;
        updateArrivalAmount();
        return;
      }

      if (kind === 'move') {
        if (match.matched) {
          if (setSelectByValue_('moveMaterialSelect', match.materialId)) {
            onMoveMaterialChange();
          }
        }
        if (qty) setSelectByValue_('moveQuantity', qty);
        if (unit && !match.matched) document.getElementById('moveUnit').value = unit;
        return;
      }
    }

    initApp();
  </script>
</body>
